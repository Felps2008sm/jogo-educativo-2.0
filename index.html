<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Jogo Educativo</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🎮 Jogo Educativo</h1>

    <div class="topo">
        <span>🏆 XP: <b id="xp">0</b></span>
        <span>⭐ Nível: <b id="nivel">1</b></span>
        <span>❤️ Vidas: <b id="vidas">3</b></span>
    </div>

    <nav>
        <button onclick="trocarAba('inicio')">🏠</button>
        <button onclick="trocarAba('ingles')">🌎</button>
        <button onclick="trocarAba('portugues')">📚</button>
        <button onclick="trocarAba('montar')">✍️</button>
        <button onclick="trocarAba('reverso')">🔄</button>
        <button onclick="trocarAba('ranking')">🏆</button>
    </nav>
</header>

<main>

<section id="inicio" class="aba ativa">
    <h2>Escolha o nível</h2>
    <button onclick="selecionarNivel('pre')">Pré</button>
    <button onclick="selecionarNivel('facil')">Fácil</button>
    <button onclick="selecionarNivel('medio')">Médio</button>
    <button onclick="selecionarNivel('dificil')">Difícil</button>
</section>

<section id="ingles" class="aba">
    <div class="card">
        <div id="emojiEN" class="emoji"></div>
        <h3 id="palavraEN"></h3>
        <input id="respostaEN">
        <button onclick="verificar('en')">Responder</button>
        <p id="feedbackEN"></p>
    </div>
</section>

<section id="portugues" class="aba">
    <div class="card">
        <div id="emoji" class="emoji"></div>
        <input id="resposta">
        <button onclick="verificar('pt')">Responder</button>
        <p id="feedback"></p>
    </div>
</section>

<section id="montar" class="aba">
    <div class="card">
        <div id="emojiMontar" class="emoji"></div>
        <div id="letras"></div>
        <div id="respostaMontada"></div>
        <button onclick="verificarMontagem()">Verificar</button>
        <button onclick="limpar()">Limpar</button>
        <p id="feedbackMontar"></p>
    </div>
</section>

<section id="reverso" class="aba">
    <div class="card">
        <h2>Modo Reverso</h2>
        <p id="palavraReverso"></p>
        <div id="opcoesEmoji"></div>
        <p id="feedbackReverso"></p>
    </div>
</section>

<section id="ranking" class="aba">
    <div class="card">
        <ul id="listaRanking"></ul>
    </div>
</section>

</main>

<audio id="somAcerto" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
<audio id="somErro" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
